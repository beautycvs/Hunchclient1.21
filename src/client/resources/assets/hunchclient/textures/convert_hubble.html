<!DOCTYPE html>
<html>
<head>
    <title>Hubble Image Converter für Galaxy Overlay</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        h1 {
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .dropzone {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            background: rgba(102, 126, 234, 0.05);
            transition: all 0.3s;
        }
        .dropzone.dragover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #764ba2;
        }
        canvas {
            border: 1px solid #333;
            max-width: 100%;
            margin: 10px 0;
            border-radius: 5px;
            display: none;
        }
        button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: 16px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .controls {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .control-group {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        label {
            width: 150px;
            font-weight: 500;
        }
        input[type="range"] {
            flex: 1;
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }
        .value {
            width: 60px;
            text-align: right;
            font-weight: bold;
            color: #667eea;
        }
        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .preview-box {
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 10px;
        }
        .preview-box h3 {
            margin-top: 0;
            color: #667eea;
        }
        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 Hubble to Galaxy Overlay Converter</h1>
        <p>Konvertiere dein 4K Hubble-Bild für den perfekten Viewmodel Overlay Effekt!</p>

        <div class="dropzone" id="dropzone">
            <p style="font-size: 24px;">📁 Drag & Drop dein Hubble JPG hier</p>
            <p>oder</p>
            <button onclick="document.getElementById('fileInput').click()">Datei auswählen</button>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="controls" id="controls" style="display: none;">
            <h3>🎨 Optimierung für Galaxy Overlay</h3>

            <div class="control-group">
                <label>Brightness:</label>
                <input type="range" id="brightness" min="-100" max="100" value="0">
                <span class="value" id="brightnessVal">0</span>
            </div>

            <div class="control-group">
                <label>Contrast:</label>
                <input type="range" id="contrast" min="-100" max="100" value="20">
                <span class="value" id="contrastVal">20</span>
            </div>

            <div class="control-group">
                <label>Saturation:</label>
                <input type="range" id="saturation" min="0" max="200" value="120">
                <span class="value" id="saturationVal">120</span>
            </div>

            <div class="control-group">
                <label>Transparency:</label>
                <input type="range" id="opacity" min="0" max="100" value="85">
                <span class="value" id="opacityVal">85%</span>
            </div>

            <div class="control-group">
                <label>Blur (Glow):</label>
                <input type="range" id="blur" min="0" max="10" value="2">
                <span class="value" id="blurVal">2px</span>
            </div>

            <div class="control-group">
                <label>Output Size:</label>
                <select id="outputSize" style="padding: 5px; background: #333; color: white; border: 1px solid #667eea; border-radius: 5px;">
                    <option value="512">512x512 (Schnell)</option>
                    <option value="1024" selected>1024x1024 (Empfohlen)</option>
                    <option value="2048">2048x2048 (High Quality)</option>
                </select>
            </div>
        </div>

        <div class="preview-container" id="previewContainer" style="display: none;">
            <div class="preview-box">
                <h3>Original</h3>
                <canvas id="original"></canvas>
            </div>
            <div class="preview-box">
                <h3>Optimized für Galaxy Overlay</h3>
                <canvas id="preview"></canvas>
            </div>
        </div>

        <div style="text-align: center; margin: 30px 0; display: none;" id="downloadSection">
            <button onclick="downloadImage()" style="font-size: 18px; padding: 15px 30px;">
                💾 Download als galaxy.png
            </button>
            <button onclick="previewAnimation()" style="font-size: 18px; padding: 15px 30px;">
                ▶️ Preview Animation
            </button>
        </div>
    </div>

    <script>
        let originalImage = null;
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const originalCanvas = document.getElementById('original');
        const previewCanvas = document.getElementById('preview');
        const originalCtx = originalCanvas.getContext('2d');
        const previewCtx = previewCanvas.getContext('2d');
        let animating = false;

        // Drag & Drop
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadImage(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadImage(file);
            }
        });

        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    showControls();
                    processImage();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function showControls() {
            document.getElementById('controls').style.display = 'block';
            document.getElementById('previewContainer').style.display = 'grid';
            document.getElementById('downloadSection').style.display = 'block';
            originalCanvas.style.display = 'block';
            previewCanvas.style.display = 'block';
        }

        // Control listeners
        ['brightness', 'contrast', 'saturation', 'opacity', 'blur', 'outputSize'].forEach(id => {
            const element = document.getElementById(id);
            element.addEventListener('input', () => {
                document.getElementById(id + 'Val').textContent =
                    id === 'opacity' ? element.value + '%' :
                    id === 'blur' ? element.value + 'px' :
                    element.value;
                processImage();
            });
        });

        function processImage() {
            if (!originalImage) return;

            const outputSize = parseInt(document.getElementById('outputSize').value);

            // Setup canvases
            originalCanvas.width = outputSize;
            originalCanvas.height = outputSize;
            previewCanvas.width = outputSize;
            previewCanvas.height = outputSize;

            // Draw original (scaled)
            originalCtx.drawImage(originalImage, 0, 0, outputSize, outputSize);

            // Apply effects
            const brightness = parseInt(document.getElementById('brightness').value);
            const contrast = parseInt(document.getElementById('contrast').value);
            const saturation = parseInt(document.getElementById('saturation').value) / 100;
            const opacity = parseInt(document.getElementById('opacity').value) / 100;
            const blur = parseInt(document.getElementById('blur').value);

            // Create temporary canvas for processing
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = outputSize;
            tempCanvas.height = outputSize;
            const tempCtx = tempCanvas.getContext('2d');

            // Apply blur for glow effect
            if (blur > 0) {
                tempCtx.filter = `blur(${blur}px)`;
            }
            tempCtx.drawImage(originalImage, 0, 0, outputSize, outputSize);

            // Get image data
            const imageData = tempCtx.getImageData(0, 0, outputSize, outputSize);
            const data = imageData.data;

            // Apply brightness, contrast, saturation
            for (let i = 0; i < data.length; i += 4) {
                // Get RGB
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];

                // Apply contrast
                const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
                r = factor * (r - 128) + 128;
                g = factor * (g - 128) + 128;
                b = factor * (b - 128) + 128;

                // Apply brightness
                r += brightness;
                g += brightness;
                b += brightness;

                // Apply saturation
                const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                r = gray + saturation * (r - gray);
                g = gray + saturation * (g - gray);
                b = gray + saturation * (b - gray);

                // Clamp values
                data[i] = Math.max(0, Math.min(255, r));
                data[i + 1] = Math.max(0, Math.min(255, g));
                data[i + 2] = Math.max(0, Math.min(255, b));

                // Apply transparency
                data[i + 3] = data[i + 3] * opacity;
            }

            // Draw processed image
            previewCtx.clearRect(0, 0, outputSize, outputSize);
            previewCtx.putImageData(imageData, 0, 0);

            // Add extra glow layer for bright areas
            previewCtx.globalCompositeOperation = 'screen';
            previewCtx.globalAlpha = 0.3;
            previewCtx.filter = 'blur(10px)';
            previewCtx.drawImage(previewCanvas, 0, 0);
            previewCtx.filter = 'none';
            previewCtx.globalAlpha = 1.0;
            previewCtx.globalCompositeOperation = 'source-over';
        }

        function downloadImage() {
            previewCanvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'galaxy.png';
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        function previewAnimation() {
            animating = !animating;
            if (!animating) {
                processImage(); // Reset to static image
                return;
            }

            let time = 0;
            const outputSize = parseInt(document.getElementById('outputSize').value);

            // Create second canvas for composite
            const compCanvas = document.createElement('canvas');
            compCanvas.width = outputSize;
            compCanvas.height = outputSize;
            const compCtx = compCanvas.getContext('2d');

            function animate() {
                if (!animating) return;

                // Clear canvas
                previewCtx.clearRect(0, 0, outputSize, outputSize);
                compCtx.clearRect(0, 0, outputSize, outputSize);

                // First, redraw the processed image
                processImage();

                // Store the static processed image
                compCtx.drawImage(previewCanvas, 0, 0);

                // Clear for animation
                previewCtx.clearRect(0, 0, outputSize, outputSize);

                // EFFECT 1: Scrolling overlay (like in shader)
                const scrollX = Math.sin(time * 0.5) * 30;
                const scrollY = Math.cos(time * 0.3) * 20;

                // Draw main texture with offset
                previewCtx.save();
                previewCtx.translate(scrollX, scrollY);
                previewCtx.drawImage(compCanvas, 0, 0);
                previewCtx.drawImage(compCanvas, -outputSize, 0);
                previewCtx.drawImage(compCanvas, 0, -outputSize);
                previewCtx.drawImage(compCanvas, -outputSize, -outputSize);
                previewCtx.restore();

                // EFFECT 2: Color shift overlay
                previewCtx.globalCompositeOperation = 'overlay';
                previewCtx.fillStyle = `hsla(${(time * 30) % 360}, 70%, 50%, 0.2)`;
                previewCtx.fillRect(0, 0, outputSize, outputSize);

                // EFFECT 3: Pulsing glow
                const pulse = Math.sin(time * 2) * 0.1 + 0.9;
                previewCtx.globalCompositeOperation = 'screen';
                previewCtx.globalAlpha = pulse * 0.3;
                previewCtx.filter = 'blur(20px)';
                previewCtx.drawImage(compCanvas, 0, 0);

                // EFFECT 4: Sparkles/Stars
                previewCtx.filter = 'none';
                previewCtx.globalCompositeOperation = 'lighter';
                previewCtx.globalAlpha = 1;
                for (let i = 0; i < 5; i++) {
                    const starX = (Math.sin(time * (0.7 + i * 0.1)) * 0.5 + 0.5) * outputSize;
                    const starY = (Math.cos(time * (0.5 + i * 0.15)) * 0.5 + 0.5) * outputSize;
                    const starSize = Math.sin(time * 4 + i) * 2 + 3;

                    const gradient = previewCtx.createRadialGradient(starX, starY, 0, starX, starY, starSize * 4);
                    gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
                    gradient.addColorStop(0.2, 'rgba(200, 200, 255, 0.8)');
                    gradient.addColorStop(1, 'transparent');

                    previewCtx.fillStyle = gradient;
                    previewCtx.fillRect(starX - starSize * 4, starY - starSize * 4, starSize * 8, starSize * 8);
                }

                // Reset composite mode
                previewCtx.globalCompositeOperation = 'source-over';
                previewCtx.globalAlpha = 1;

                // Add text to show it's animating
                previewCtx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                previewCtx.font = 'bold 16px Arial';
                previewCtx.fillText('ANIMATED PREVIEW', 10, outputSize - 10);

                time += 0.02;
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
